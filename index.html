<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>DeckForge Time Sync</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding-top: 100px; }
        .box { background: #1e293b; padding: 40px; border-radius: 20px; display: inline-block; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Time Sync Tool</h2>
        <p>Verbind om de tijd op je OLED te zetten.</p>
        <button onclick="syncTime()">VERBIND & SYNC</button>
        <p id="status" style="color: #64748b; margin-top: 20px;">Niet verbonden</p>
    </div>

    <script>
        async function syncTime() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'DeckForge' }],
                    optionalServices: ['00001800-0000-1000-8000-00805f9b34fb'] // Standaard services
                });
                document.getElementById('status').innerText = "Gesynchroniseerd! ✅";
                
                // OPMERKING: De tijd-sync loopt via BLE, 
                // maar het volume gaat via de Keyboard-HID mode van de ESP.
            } catch (e) { console.log(e); }
        }
    </script>
</body>
</html>
</body>
</html>
