<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>DeckForge Pro Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 30px; }
        .container { max-width: 450px; margin: auto; background: #1e293b; padding: 25px; border-radius: 20px; }
        #status { font-weight: bold; color: #3b82f6; margin-bottom: 20px; }
        .mode-display { font-size: 24px; color: #f59e0b; margin: 20px 0; border: 2px solid #444; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>DeckForge Pro</h2>
        <div id="status">Status: Losgekoppeld</div>
        <button onclick="connectBT()" id="btn" style="padding:10px; border-radius:10px; cursor:pointer;">VERBINDEN</button>
        
        <div class="mode-display" id="mode">Menu: Tijd</div>
        <div id="valDisplay">Waarde: 0%</div>
    </div>

    <script>
        let btChar;

        async function connectBT() {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'DeckForge' }],
                optionalServices: ['12345678-1234-1234-1234-123456789abc']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('12345678-1234-1234-1234-123456789abc');
            btChar = await service.getCharacteristic('12345678-1234-1234-1234-123456789abd');
            
            document.getElementById('status').innerText = "Status: Verbonden ✅";
            
            // Start tijd-sync naar ESP
            setInterval(() => {
                const nu = new Date();
                const msg = "T:" + nu.toLocaleDateString() + " " + nu.toLocaleTimeString();
                btChar.writeValue(new TextEncoder().encode(msg));
            }, 1000);

            // Ontvang data VAN de ESP (Potentiometer standen)
            await btChar.startNotifications();
            btChar.addEventListener('characteristicvaluechanged', (event) => {
                let str = new TextDecoder().decode(event.target.value);
                handleESPData(str);
            });
        }

        function handleESPData(data) {
            // Data komt binnen als bijv "VOL:50" of "BRIGHT:80"
            const [type, val] = data.split(':');
            document.getElementById('mode').innerText = "Modus: " + type;
            document.getElementById('valDisplay').innerText = "Waarde: " + val + "%";

            // Let op: echte systeem-volume/helderheid via browser is beperkt 
            // voor echte controle heb je vaak een extra appje nodig, 
            // maar we tonen hier dat de data binnenkomt!
            console.log("ESP stuurt actie:", type, val);
        }
    </script>
</body>
</html>
