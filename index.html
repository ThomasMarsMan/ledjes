<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>DeckForge System Control</title>
    <style>
        /* Helderheid overlay */
        #brightnessOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; opacity: 0; pointer-events: none; z-index: 9999;
        }
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; transition: 0.2s; }
        .container { max-width: 400px; margin: 100px auto; background: #1e293b; padding: 30px; border-radius: 20px; }
        .stat { font-size: 32px; color: #f59e0b; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="brightnessOverlay"></div>
    <div class="container">
        <h2>DeckForge Control</h2>
        <button id="btn" onclick="connectBT()" style="padding:15px; border-radius:10px;">VERBINDEN</button>
        <div id="modeDisplay" class="stat">Menu: Tijd</div>
        <div id="valDisplay" style="font-size: 20px;">Waarde: 0%</div>
        <p><i>Houd dit tabblad open om je apparaat te besturen.</i></p>
    </div>

    <script>
        let btChar;
        
        async function connectBT() {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'DeckForge' }],
                optionalServices: ['12345678-1234-1234-1234-123456789abc']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('12345678-1234-1234-1234-123456789abc');
            btChar = await service.getCharacteristic('12345678-1234-1234-1234-123456789abd');
            
            document.getElementById('btn').innerText = "VERBONDEN ✅";

            // Sync tijd naar ESP
            setInterval(() => {
                const n = new Date();
                btChar.writeValue(new TextEncoder().encode("T:"+n.toLocaleDateString()+" "+n.toLocaleTimeString()));
            }, 1000);

            // Luister naar de Potentiometer
            await btChar.startNotifications();
            btChar.addEventListener('characteristicvaluechanged', (e) => {
                let msg = new TextDecoder().decode(e.target.value);
                let [type, val] = msg.split(':');
                updateSystem(type, parseInt(val));
            });
        }

        function updateSystem(type, val) {
            document.getElementById('modeDisplay').innerText = type;
            document.getElementById('valDisplay').innerText = val + "%";

            if (type === "VOLUME") {
                // We kunnen niet het systeemvolume van Windows regelen, 
                // maar wel de media in je browser.
                const audioElements = document.querySelectorAll('video, audio');
                audioElements.forEach(el => el.volume = val / 100);
            } 
            else if (type === "BRIGHT") {
                // Simuleer helderheid door het scherm donkerder te maken
                const opacity = (100 - val) / 100;
                document.getElementById('brightnessOverlay').style.opacity = opacity * 0.8;
            }
        }
    </script>
</body>
</html>
