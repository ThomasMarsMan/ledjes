<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>DeckForge LED Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f172a; color: white; padding-top: 50px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: auto; }
        button { padding: 15px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; transition: 0.3s; }
        
        /* Status Kleuren */
        .connect { background: #3b82f6; width: 100%; margin-bottom: 20px; text-transform: uppercase; }
        .connected { background: #22c55e !important; } /* Fel groen als verbonden */
        
        .blue { background: #2563eb; color: white; }
        .red { background: #dc2626; color: white; }
        .off { background: #334155; color: white; }
        .blink { background: #f59e0b; color: black; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>DeckForge Controller</h1>
    
    <button id="statusBtn" class="connect" onclick="connectBT()">Klik om te verbinden</button>
    
    <div class="grid">
        <button class="blue" onclick="send('B_ON')">Blauw AAN</button>
        <button class="off" onclick="send('B_OFF')">Blauw UIT</button>
        <button class="red" onclick="send('R_ON')">Rood AAN</button>
        <button class="off" onclick="send('R_OFF')">Rood UIT</button>
        <button class="blink" onclick="send('BLINK')">Knipperen</button>
        <button class="off" onclick="send('ALL_OFF')">Alles UIT</button>
    </div>

    <script>
        let btChar;
        let bluetoothDevice;

        async function connectBT() {
            const btn = document.getElementById('statusBtn');
            try {
                btn.innerText = "Zoeken...";
                
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'DeckForge' }],
                    optionalServices: ['12345678-1234-1234-1234-123456789abc']
                });

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService('12345678-1234-1234-1234-123456789abc');
                btChar = await service.getCharacteristic('12345678-1234-1234-1234-123456789abd');

                // Als we hier komen, is het gelukt!
                btn.innerText = "VERBONDEN ✅";
                btn.classList.add('connected');
                
                // Luister of de verbinding verbreekt
                bluetoothDevice.addEventListener('gattserverdisconnected', () => {
                    btn.innerText = "VERBINDING VERBROKEN ❌";
                    btn.classList.remove('connected');
                });

            } catch (error) {
                console.log(error);
                btn.innerText = "FOUT: PROBEER OPNIEUW";
            }
        }

        async function send(msg) {
            if (btChar) {
                const enc = new TextEncoder().encode(msg);
                await btChar.writeValue(enc);
            } else {
                alert("Verbind eerst met de ESP32!");
            }
        }
    </script>
</body>
</html>
